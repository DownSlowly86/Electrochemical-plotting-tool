name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.0"
        required: true
        type: string
      prerelease:
        description: "Mark this release as a pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Package desktop app
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }

          if (-not ($tag -match '^v[0-9]+(\.[0-9]+){1,2}([-.][0-9A-Za-z.-]+)?$')) {
            throw "Release tag must look like v0.2.0."
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build release package
        shell: pwsh
        run: |
          $packageRoot = "release-package"
          $packageName = "Electrochemical-plotting-tool-$env:RELEASE_TAG"
          $packageDir = Join-Path $packageRoot $packageName

          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

          $files = @(
            "desktop_app_v0_2.py",
            "desktop_app.py",
            "run_desktop_app.ps1",
            "README.md",
            ".gitignore"
          )

          foreach ($file in $files) {
            if (Test-Path -LiteralPath $file) {
              Copy-Item -LiteralPath $file -Destination $packageDir -Force
            }
          }

          if (Test-Path -LiteralPath "examples") {
            Copy-Item -LiteralPath "examples" -Destination $packageDir -Recurse -Force
          }

          Compress-Archive `
            -Path $packageDir `
            -DestinationPath "$packageName.zip" `
            -Force

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $packageName = "Electrochemical-plotting-tool-$env:RELEASE_TAG"
          $args = @(
            "release",
            "create",
            $env:RELEASE_TAG,
            "$packageName.zip",
            "--title",
            "Electrochemical Plotting Tool $env:RELEASE_TAG",
            "--generate-notes",
            "--target",
            "${{ github.sha }}"
          )

          if ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.prerelease }}" -eq "true") {
            $args += "--prerelease"
          }

          gh @args
